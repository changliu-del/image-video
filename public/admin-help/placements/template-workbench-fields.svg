<svg width="940" height="230" viewBox="0 0 940 230" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="940" height="230" rx="14" fill="#f8fafc"/>
  <image href="/admin-help/placements/template-video-workbench-key.png" x="0" y="-52" width="430" height="575" preserveAspectRatio="xMidYMid slice" opacity="0.18"/>
  <rect x="14" y="14" width="912" height="202" rx="14" fill="white" fill-opacity="0.72" stroke="#e5e7eb"/>

  <rect x="28" y="32" width="168" height="168" rx="14" fill="white" fill-opacity="0.94" stroke="#6366f1" stroke-width="3"/>
  <text x="48" y="66" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#111827">工作台入口</text>
  <text x="48" y="96" font-family="Arial, sans-serif" font-size="13" fill="#374151">type</text>
  <text x="48" y="130" font-family="Arial, sans-serif" font-size="13" fill="#374151">决定模板出现</text>
  <text x="48" y="152" font-family="Arial, sans-serif" font-size="13" fill="#374151">在哪个创作入口。</text>

  <rect x="208" y="32" width="168" height="168" rx="14" fill="white" fill-opacity="0.94" stroke="#f97316" stroke-width="3"/>
  <text x="228" y="66" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#111827">默认提示词</text>
  <text x="228" y="96" font-family="Arial, sans-serif" font-size="13" fill="#374151">prompt</text>
  <text x="228" y="118" font-family="Arial, sans-serif" font-size="13" fill="#374151">negativePrompt</text>
  <text x="228" y="152" font-family="Arial, sans-serif" font-size="13" fill="#374151">影响生成方向。</text>

  <rect x="388" y="32" width="168" height="168" rx="14" fill="white" fill-opacity="0.94" stroke="#22c55e" stroke-width="3"/>
  <text x="408" y="66" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#111827">模板选择项</text>
  <text x="408" y="96" font-family="Arial, sans-serif" font-size="13" fill="#374151">preview / thumbnail</text>
  <text x="408" y="118" font-family="Arial, sans-serif" font-size="13" fill="#374151">title</text>
  <text x="408" y="152" font-family="Arial, sans-serif" font-size="13" fill="#374151">帮助用户识别</text>
  <text x="408" y="174" font-family="Arial, sans-serif" font-size="13" fill="#374151">要套用的模板。</text>

  <rect x="568" y="32" width="168" height="168" rx="14" fill="white" fill-opacity="0.94" stroke="#0ea5e9" stroke-width="3"/>
  <text x="588" y="66" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#111827">规格和扣费</text>
  <text x="588" y="96" font-family="Arial, sans-serif" font-size="13" fill="#374151">aspectRatios</text>
  <text x="588" y="118" font-family="Arial, sans-serif" font-size="13" fill="#374151">duration / credits</text>
  <text x="588" y="152" font-family="Arial, sans-serif" font-size="13" fill="#374151">影响画幅、时长</text>
  <text x="588" y="174" font-family="Arial, sans-serif" font-size="13" fill="#374151">和算力说明。</text>

  <rect x="748" y="32" width="168" height="168" rx="14" fill="white" fill-opacity="0.94" stroke="#f59e0b" stroke-width="3"/>
  <text x="768" y="66" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#111827">分类和优先级</text>
  <text x="768" y="96" font-family="Arial, sans-serif" font-size="13" fill="#374151">tags</text>
  <text x="768" y="118" font-family="Arial, sans-serif" font-size="13" fill="#374151">sortWeight</text>
  <text x="768" y="152" font-family="Arial, sans-serif" font-size="13" fill="#374151">控制筛选和</text>
  <text x="768" y="174" font-family="Arial, sans-serif" font-size="13" fill="#374151">同类排序。</text>
