<svg width="940" height="230" viewBox="0 0 940 230" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="940" height="230" rx="14" fill="#f8fafc"/>
  <image href="/admin-help/placements/templates-page.png" x="-330" y="-430" width="1280" height="720" preserveAspectRatio="none" opacity="0.16"/>
  <rect x="14" y="14" width="912" height="202" rx="14" fill="white" fill-opacity="0.72" stroke="#e5e7eb"/>

  <rect x="28" y="32" width="168" height="168" rx="14" fill="white" fill-opacity="0.94" stroke="#f97316" stroke-width="3"/>
  <text x="48" y="66" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#111827">可见性和筛选</text>
  <text x="48" y="96" font-family="Arial, sans-serif" font-size="13" fill="#374151">status / locale</text>
  <text x="48" y="118" font-family="Arial, sans-serif" font-size="13" fill="#374151">tags</text>
  <text x="48" y="152" font-family="Arial, sans-serif" font-size="13" fill="#374151">决定用户能不能</text>
  <text x="48" y="174" font-family="Arial, sans-serif" font-size="13" fill="#374151">找到这条模板。</text>

  <rect x="208" y="32" width="168" height="168" rx="14" fill="white" fill-opacity="0.94" stroke="#0ea5e9" stroke-width="3"/>
  <text x="228" y="66" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#111827">排序</text>
  <text x="228" y="96" font-family="Arial, sans-serif" font-size="13" fill="#374151">sortWeight</text>
  <text x="228" y="130" font-family="Arial, sans-serif" font-size="13" fill="#374151">同类模板里，</text>
  <text x="228" y="152" font-family="Arial, sans-serif" font-size="13" fill="#374151">权重越高越靠前。</text>

  <rect x="388" y="32" width="168" height="168" rx="14" fill="white" fill-opacity="0.94" stroke="#22c55e" stroke-width="3"/>
  <text x="408" y="66" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#111827">卡片封面</text>
  <text x="408" y="96" font-family="Arial, sans-serif" font-size="13" fill="#374151">preview</text>
  <text x="408" y="118" font-family="Arial, sans-serif" font-size="13" fill="#374151">thumbnail</text>
  <text x="408" y="152" font-family="Arial, sans-serif" font-size="13" fill="#374151">用户第一眼判断</text>
  <text x="408" y="174" font-family="Arial, sans-serif" font-size="13" fill="#374151">效果的位置。</text>

  <rect x="568" y="32" width="168" height="168" rx="14" fill="white" fill-opacity="0.94" stroke="#6366f1" stroke-width="3"/>
  <text x="588" y="66" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#111827">卡片文案</text>
  <text x="588" y="96" font-family="Arial, sans-serif" font-size="13" fill="#374151">title / description</text>
  <text x="588" y="118" font-family="Arial, sans-serif" font-size="13" fill="#374151">hook / CTA</text>
  <text x="588" y="152" font-family="Arial, sans-serif" font-size="13" fill="#374151">说明用途、场景</text>
  <text x="588" y="174" font-family="Arial, sans-serif" font-size="13" fill="#374151">和下一步动作。</text>

  <rect x="748" y="32" width="168" height="168" rx="14" fill="white" fill-opacity="0.94" stroke="#f59e0b" stroke-width="3"/>
  <text x="768" y="66" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#111827">类型和成本</text>
  <text x="768" y="96" font-family="Arial, sans-serif" font-size="13" fill="#374151">type</text>
  <text x="768" y="118" font-family="Arial, sans-serif" font-size="13" fill="#374151">costCredits</text>
  <text x="768" y="152" font-family="Arial, sans-serif" font-size="13" fill="#374151">影响格式判断和</text>
  <text x="768" y="174" font-family="Arial, sans-serif" font-size="13" fill="#374151">算力预期。</text>
