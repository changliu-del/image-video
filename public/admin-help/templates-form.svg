    <rect x="426" y="286" width="214" height="18" rx="4" fill="#f3f4f6"/>
    <rect x="682" y="246" width="250" height="70" rx="10" fill="#ffffff" stroke="#e5e7eb"/>
    <text x="700" y="274" font-size="13" font-weight="700" fill="#6b7280">CTA</text>
    <rect x="700" y="286" width="214" height="18" rx="4" fill="#f3f4f6"/>
    <rect x="408" y="338" width="704" height="70" rx="10" fill="#ffffff" stroke="#e5e7eb"/>
    <text x="426" y="366" font-size="13" font-weight="700" fill="#6b7280">Description</text>
