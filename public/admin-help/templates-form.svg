<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="680" viewBox="0 0 1200 680" role="img" aria-labelledby="title desc">
  <title id="title">Template admin form guide</title>
  <desc id="desc">A simplified template admin form showing preview media, core fields, prompt fields, and publishing settings.</desc>
  <rect width="1200" height="680" fill="#f8fafc"/>
  <rect x="40" y="36" width="1120" height="608" rx="18" fill="#ffffff" stroke="#e5e7eb"/>
  <text x="72" y="86" font-family="Arial, sans-serif" font-size="28" font-weight="700" fill="#111827">Template Admin Form</text>
  <text x="72" y="118" font-family="Arial, sans-serif" font-size="16" fill="#6b7280">Use this page to create a generation recipe and publish it to the matching frontend workbench.</text>

  <rect x="72" y="154" width="300" height="188" rx="14" fill="#f9fafb" stroke="#d1d5db" stroke-dasharray="8 8"/>
  <text x="152" y="250" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#9ca3af">Preview / Thumbnail</text>
  <rect x="72" y="366" width="300" height="196" rx="14" fill="#ffffff" stroke="#e5e7eb"/>
  <text x="96" y="402" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#374151">Media roles</text>
  <rect x="96" y="426" width="252" height="30" rx="6" fill="#f3f4f6" stroke="#e5e7eb"/>
  <text x="114" y="447" font-family="Arial, sans-serif" font-size="14" fill="#6b7280">preview</text>
  <rect x="96" y="466" width="252" height="30" rx="6" fill="#f3f4f6" stroke="#e5e7eb"/>
  <text x="114" y="487" font-family="Arial, sans-serif" font-size="14" fill="#6b7280">thumbnail</text>
  <rect x="96" y="506" width="252" height="30" rx="6" fill="#f3f4f6" stroke="#e5e7eb"/>
  <text x="114" y="527" font-family="Arial, sans-serif" font-size="14" fill="#6b7280">source / example</text>

  <g font-family="Arial, sans-serif">
    <rect x="408" y="154" width="170" height="70" rx="10" fill="#ffffff" stroke="#e5e7eb"/>
    <text x="426" y="182" font-size="13" font-weight="700" fill="#6b7280">Title</text>
    <rect x="426" y="194" width="136" height="18" rx="4" fill="#f3f4f6"/>
    <rect x="602" y="154" width="170" height="70" rx="10" fill="#ffffff" stroke="#e5e7eb"/>
    <text x="620" y="182" font-size="13" font-weight="700" fill="#6b7280">Slug</text>
    <rect x="620" y="194" width="136" height="18" rx="4" fill="#f3f4f6"/>
    <rect x="796" y="154" width="170" height="70" rx="10" fill="#ffffff" stroke="#e5e7eb"/>
    <text x="814" y="182" font-size="13" font-weight="700" fill="#6b7280">Locale</text>
    <rect x="814" y="194" width="136" height="18" rx="4" fill="#f3f4f6"/>
    <rect x="990" y="154" width="122" height="70" rx="10" fill="#ffffff" stroke="#e5e7eb"/>
    <text x="1008" y="182" font-size="13" font-weight="700" fill="#6b7280">Type</text>
    <rect x="1008" y="194" width="76" height="18" rx="4" fill="#f3f4f6"/>

    <rect x="408" y="246" width="250" height="70" rx="10" fill="#ffffff" stroke="#e5e7eb"/>
