<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="680" viewBox="0 0 1200 680" role="img" aria-labelledby="title desc">
  <title id="title">Library asset admin form guide</title>
  <desc id="desc">A simplified library asset upload form showing file preview, metadata, use cases, and publishing controls.</desc>
  <rect width="1200" height="680" fill="#f8fafc"/>
  <rect x="40" y="36" width="1120" height="608" rx="18" fill="#ffffff" stroke="#e5e7eb"/>
  <text x="72" y="86" font-family="Arial, sans-serif" font-size="28" font-weight="700" fill="#111827">Library Asset Admin Form</text>
  <text x="72" y="118" font-family="Arial, sans-serif" font-size="16" fill="#6b7280">Use this page to upload reusable media and publish it to the right workbench material shelf.</text>

  <rect x="72" y="154" width="300" height="300" rx="14" fill="#f9fafb" stroke="#d1d5db" stroke-dasharray="8 8"/>
  <text x="168" y="312" font-family="Arial, sans-serif" font-size="20" font-weight="700" fill="#9ca3af">Asset Preview</text>
  <rect x="72" y="482" width="300" height="100" rx="14" fill="#ffffff" stroke="#e5e7eb"/>
  <text x="96" y="518" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#374151">Upload file</text>
  <rect x="96" y="538" width="252" height="30" rx="6" fill="#f3f4f6" stroke="#e5e7eb"/>
  <text x="114" y="559" font-family="Arial, sans-serif" font-size="14" fill="#6b7280">PNG / JPG / WEBP / MP4 / WEBM</text>

  <g font-family="Arial, sans-serif">
    <rect x="408" y="154" width="342" height="70" rx="10" fill="#ffffff" stroke="#e5e7eb"/>
    <text x="426" y="182" font-size="13" font-weight="700" fill="#6b7280">Title</text>
    <rect x="426" y="194" width="306" height="18" rx="4" fill="#f3f4f6"/>
    <rect x="772" y="154" width="340" height="70" rx="10" fill="#ffffff" stroke="#e5e7eb"/>
    <text x="790" y="182" font-size="13" font-weight="700" fill="#6b7280">Locale</text>
    <rect x="790" y="194" width="296" height="18" rx="4" fill="#f3f4f6"/>

    <rect x="408" y="246" width="342" height="70" rx="10" fill="#ffffff" stroke="#e5e7eb"/>
    <text x="426" y="274" font-size="13" font-weight="700" fill="#6b7280">Kind</text>
    <rect x="426" y="286" width="306" height="18" rx="4" fill="#f3f4f6"/>
    <rect x="772" y="246" width="340" height="70" rx="10" fill="#ffffff" stroke="#e5e7eb"/>
    <text x="790" y="274" font-size="13" font-weight="700" fill="#6b7280">Status</text>
    <rect x="790" y="286" width="296" height="18" rx="4" fill="#f3f4f6"/>

    <rect x="408" y="338" width="704" height="70" rx="10" fill="#ffffff" stroke="#e5e7eb"/>
    <text x="426" y="366" font-size="13" font-weight="700" fill="#6b7280">Description</text>
    <rect x="426" y="378" width="670" height="18" rx="4" fill="#f3f4f6"/>
    <rect x="408" y="430" width="704" height="70" rx="10" fill="#ffffff" stroke="#e5e7eb"/>
    <text x="426" y="458" font-size="13" font-weight="700" fill="#6b7280">Use cases</text>
    <rect x="426" y="470" width="670" height="18" rx="4" fill="#f3f4f6"/>
    <rect x="408" y="522" width="704" height="70" rx="10" fill="#ffffff" stroke="#e5e7eb"/>
    <text x="426" y="550" font-size="13" font-weight="700" fill="#6b7280">Tags</text>
    <rect x="426" y="562" width="670" height="18" rx="4" fill="#f3f4f6"/>

    <rect x="408" y="614" width="170" height="44" rx="10" fill="#fff7ed" stroke="#fed7aa"/>
    <text x="426" y="642" font-size="14" font-weight="700" fill="#9a3412">Quality</text>
    <rect x="602" y="614" width="170" height="44" rx="10" fill="#fff7ed" stroke="#fed7aa"/>
    <text x="620" y="642" font-size="14" font-weight="700" fill="#9a3412">Sort Weight</text>
    <rect x="796" y="614" width="170" height="44" rx="10" fill="#fff7ed" stroke="#fed7aa"/>
    <text x="814" y="642" font-size="14" font-weight="700" fill="#9a3412">Source</text>
    <rect x="990" y="614" width="122" height="44" rx="10" fill="#fff7ed" stroke="#fed7aa"/>
    <text x="1008" y="642" font-size="14" font-weight="700" fill="#9a3412">License</text>
  </g>
</svg>
